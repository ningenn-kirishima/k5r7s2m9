<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>ゲーム選定ツール</title>
<style>
  :root{
    --bg:#12101a; --panel:#1b1826; --panel2:#211d30; --line:#312b45;
    --ink:#e8e4f0; --sub:#9a93b0; --faint:#6b6482;
    --amber:#ffb347;
    --rS:#ffb347; --rA:#e05cc8; --rB:#8bd45a; --rC:#4a9ae0; --rD:#7a7488;
    --pick:#7b6cf0; --hide:#c56b6b; --adopt:#5db3b0;
    --sbw:300px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,-apple-system,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}

  /* 読み込み画面 */
  #loader{max-width:560px;margin:40px auto;padding:14px}
  #loader h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  #loader h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
  .gist{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px}
  .glabel{font-size:11px;color:var(--faint);letter-spacing:.1em;font-weight:700;margin-bottom:7px}
  .grow{display:flex;gap:7px}
  .grow input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px 12px;border-radius:10px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .grow input:focus{outline:none;border-color:var(--amber)}
  .gnote{font-size:11.5px;color:var(--faint);margin-top:8px}
  .gnote.err{color:#e08a8a}.gnote.ok{color:var(--rB)}
  #loader.hidden{display:none}

  /* レイアウト：サイドバー + 一覧 */
  #app{display:none}
  #app.show{display:block}
  .layout{display:flex;align-items:flex-start;gap:16px;padding:14px;max-width:1200px;margin:0 auto;flex-direction:row-reverse}
  .sidebar{width:var(--sbw);flex:none;position:sticky;top:14px;
    max-height:calc(100vh - 28px);overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .main{flex:1;min-width:0}

  /* 一覧側の上部固定バー：ステップ＋書き出し・管理 */
  .listtop{position:sticky;top:14px;z-index:5;background:var(--bg);isolation:isolate;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--line)}
  /* 固定バーの上に残る余白（sticky top分）を背景で塞ぎ、スクロールしたカードの覗き込みを防ぐ */
  .listtop::before{content:"";position:absolute;left:0;right:0;bottom:100%;height:64px;background:var(--bg)}
  .listtop .steps{display:flex;flex-direction:row;gap:5px;flex-wrap:wrap}
  .listtop .step{width:auto}
  .listtop .exportbar{display:flex;gap:6px;flex-wrap:wrap}
  .listtop .sbact{width:auto;margin-top:0}

  .sbtitle{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:12px}
  .sbtitle .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .sec{margin-bottom:16px}
  .sec > .lb{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.1em;margin-bottom:7px;text-transform:uppercase}

  .steps{display:flex;flex-direction:column;gap:5px}
  .step{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    padding:9px 11px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;text-align:left;
    display:flex;align-items:center;gap:7px;transition:.15s}
  .step.on{border-color:var(--amber);color:var(--amber)}
  .step .n{font-size:11px;font-weight:800;color:var(--amber)}

  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    padding:5px 10px;border-radius:20px;font-size:11.5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip.on{border-color:var(--amber);color:var(--amber)}
  .searchbox{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:9px 11px;border-radius:9px;font-size:12.5px}
  .searchbox:focus{outline:none;border-color:var(--amber)}
  .resetbtn{background:none;border:1px solid var(--line);color:var(--faint);
    padding:4px 10px;border-radius:16px;font-size:10.5px;cursor:pointer;margin-left:auto}
  .resetbtn:hover{border-color:var(--hide);color:var(--hide)}
  .lbrow{display:flex;align-items:center;margin-bottom:7px}
  .lbrow .lb{margin-bottom:0}
  .sortline{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .dirbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:5px 12px;border-radius:20px;font-size:11.5px;cursor:pointer}
  .dirbtn:hover{border-color:var(--amber);color:var(--amber)}
  .hidebtn{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
  .hidebtn.on{border-color:var(--hide);color:var(--hide)}
  .hidenote{font-size:11px;color:var(--hide);margin-top:7px;display:none}
  .hidenote.show{display:block}

  .sbact{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:9px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;transition:.15s}
  .sbact:hover{border-color:var(--amber);color:var(--amber)}
  .sbact.pri{background:var(--amber);color:#1a140a;border-color:var(--amber)}
  .sbact.pri:hover{filter:brightness(1.08)}

  /* ハンバーガー（狭い画面） */
  .topbar{display:none}

  /* 一覧 */
  .mainhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .mainhead .t{font-size:15px;font-weight:800}
  .mainhead .c{font-size:11.5px;color:var(--faint)}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .tile{background:var(--panel);border:2px solid transparent;border-radius:10px;overflow:hidden;
    cursor:pointer;transition:.12s;position:relative}
  .tile:hover{border-color:var(--line)}
  .tile.picked{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick)}
  .tile.markhide{border-color:var(--hide);box-shadow:0 0 0 1px var(--hide)}
  .tile .media{position:relative;aspect-ratio:460/215;background:var(--panel2)}
  .tile .media img{width:100%;height:100%;object-fit:cover;display:block}
  .tile .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:34px;height:34px;border-radius:50%;background:rgba(18,16,26,.7);border:1.5px solid rgba(255,255,255,.5);
    display:flex;align-items:center;justify-content:center;pointer-events:none}
  .tile .play::after{content:"";border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px}
  .tile .body{padding:7px 8px 8px}
  .tile .nm{font-size:12px;font-weight:700;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
  .tile .fx{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .fx span{font-size:9.5px;padding:1px 5px;border-radius:4px;background:var(--panel2);color:var(--faint)}
  .fx .indie{color:var(--amber)}.fx .demo{color:var(--rB);border:1px solid var(--rB)}.fx .solo{color:var(--rB)}
  .tile .check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
    background:rgba(18,16,26,.85);border:1.5px solid var(--line);display:flex;align-items:center;
    justify-content:center;font-size:12px;color:transparent;z-index:2}
  .tile.picked .check{background:var(--pick);border-color:var(--pick);color:#fff}
  .tile.markhide .check{background:var(--hide);border-color:var(--hide);color:#fff}
  .tile .rk{position:absolute;top:6px;left:6px;font-size:10px;font-weight:800;color:#12101a;
    padding:1px 6px;border-radius:5px;display:none;z-index:2}
  .tile.ranked .rk{display:block}
  .tile .steamlink{padding:0 8px 8px;font-size:11px}
  .tile .steamlink a{color:#8fb8e8;text-decoration:none}
  .ranks{display:flex;gap:4px;padding:0 8px 8px}
  .rb{flex:1;padding:6px 0;border-radius:7px;border:1px solid var(--line);background:var(--panel2);
    color:var(--sub);font-size:12px;font-weight:800;cursor:pointer;transition:.1s}
  .rb.on{color:#12101a}
  .adoptrow{padding:0 8px 9px}
  .ab{width:100%;padding:7px 0;border-radius:8px;border:1px solid var(--adopt);background:var(--panel2);
    color:var(--adopt);font-size:11.5px;font-weight:700;cursor:pointer;transition:.1s}
  .ab.on{background:var(--adopt);color:#12101a}

  /* 非表示セクション */
  .hidesec{margin-top:26px;border-top:1px solid var(--line);padding-top:16px}
  .hidesec .lb{font-size:12px;color:var(--hide);font-weight:700;margin-bottom:10px}

  .empty{color:var(--faint);font-size:13px;text-align:center;padding:32px 0}

  /* 動画ポップアップ */
  .modal{position:fixed;inset:0;background:rgba(6,5,10,.86);z-index:50;display:none;
    align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .modal .box{width:min(900px,100%);background:#000;border-radius:12px;overflow:hidden;position:relative}
  .modal video{width:100%;max-height:80vh;display:block;background:#000}
  .modal .close{position:absolute;top:-38px;right:0;background:none;border:none;color:#fff;
    font-size:24px;cursor:pointer;line-height:1}
  .modal .cap{position:absolute;top:-34px;left:0;color:var(--sub);font-size:12.5px;max-width:80%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal .fallback{padding:40px 20px;text-align:center;color:var(--sub);font-size:13px}
  .modal .fallback a{color:#8fb8e8}

  @media (max-width:720px){
    .layout{flex-direction:column;padding:0}
    .topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;position:sticky;top:0;z-index:20;
      background:var(--bg);border-bottom:1px solid var(--line);isolation:isolate;
      -webkit-transform:translateZ(0);transform:translateZ(0)}
    .topbar h1{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
    .topbar h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
    .menubtn{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
      padding:7px 13px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
    .sidebar{position:fixed;right:0;top:0;bottom:0;width:min(320px,86vw);border-radius:0;z-index:40;
      max-height:100vh;transform:translateX(100%);transition:transform .2s}
    .sidebar.open{transform:translateX(0)}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30}
    .backdrop.show{display:block}
    .main{padding:14px}
    .listtop{top:58px}
  }
  @media (min-width:721px){ .menubtn,.backdrop{display:none} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="loader">
  <h1><span class="dot"></span>ゲーム選定ツール</h1>
  <div class="gist">
    <div class="glabel">Gist ID</div>
    <div class="grow">
      <input id="gid" type="text" placeholder="スクリプトが表示したIDを貼り付け" autocomplete="off" spellcheck="false">
      <button class="sbact pri" id="load" style="width:auto;margin-top:0;padding:11px 18px">更新</button>
    </div>
    <div class="gnote" id="gnote">一度貼れば記憶します。以後は「更新」を押すだけです。</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <h1><span class="dot"></span>ゲーム選定</h1>
    <button class="menubtn" id="menubtn">≡ 操作</button>
  </div>
  <div class="backdrop" id="backdrop"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sbtitle"><span class="dot"></span>操作</div>

      <div class="sec">
        <div class="lb">キーワード検索</div>
        <input class="searchbox" id="search" type="text" placeholder="作品名で絞り込み" autocomplete="off">
      </div>

      <div class="sec">
        <div class="lbrow"><span class="lb">絞り込み</span><button class="resetbtn" id="rf">リセット</button></div>
        <div class="chips" id="filters">
          <button class="chip" data-f="demo">体験版</button>
          <button class="chip" data-f="indie">個人開発</button>
          <button class="chip" data-f="solo">ソロ可</button>
          <button class="chip" data-f="soon">発売前</button>
          <button class="chip" data-f="video">動画あり</button>
        </div>
      </div>

      <div class="sec">
        <div class="lbrow"><span class="lb">人気タグ（オンで絞り込み）</span><button class="resetbtn" id="rt">リセット</button></div>
        <div class="chips" id="tags"></div>
      </div>

      <div class="sec">
        <div class="lbrow"><span class="lb">ジャンル（オンで絞り込み）</span><button class="resetbtn" id="rg">リセット</button></div>
        <div class="chips" id="genres"></div>
      </div>

      <div class="sec">
        <div class="lbrow"><span class="lb">並び順</span><button class="resetbtn" id="rs">リセット</button></div>
        <div class="sortline" id="sorts">
          <button class="chip sort" data-s="default">おすすめ</button>
          <button class="chip sort on" data-s="date">発売日</button>
          <button class="chip sort" data-s="rev">レビュー</button>
          <button class="chip sort" data-s="price">価格</button>
          <button class="chip sort" data-s="rank">ランク</button>
          <button class="chip sort" data-s="tagpop">タグ人気</button>
          <button class="dirbtn" id="dirbtn">▼ 降順</button>
        </div>
      </div>

      <div class="sec" id="hidesec-ctrl">
        <div class="lb">非表示</div>
        <button class="hidebtn" id="hidebtn">非表示モード</button>
        <div class="hidenote" id="hidenote">タイルをタップで非表示対象に。もう一度このボタンで確定。一覧下部の「非表示中」から戻せます。</div>
      </div>
    </aside>

    <main class="main">
      <div class="listtop">
        <div class="steps">
          <button class="step on" data-step="1">一覧<span class="n">(<span id="n1">0</span>)</span></button>
          <button class="step" data-step="2">確認中<span class="n">(<span id="n2">0</span>)</span></button>
          <button class="step" data-step="3">採用<span class="n">(<span id="n3">0</span>)</span></button>
        </div>
        <div class="exportbar">
          <button class="sbact pri" id="ics">.icsで書き出す</button>
          <button class="sbact" id="reload">最新を読み直す</button>
          <button class="sbact" id="clear">判定をリセット</button>
        </div>
      </div>
      <div class="mainhead">
        <span class="t" id="headtitle">画像で拾う</span>
        <span class="c" id="count"></span>
      </div>
      <div class="tiles" id="tiles"></div>
      <div class="hidesec" id="hidesec" style="display:none">
        <div class="lb" id="hidelb">非表示中</div>
        <div class="tiles" id="hidetiles"></div>
      </div>
    </main>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div class="cap" id="modalcap"></div>
    <button class="close" id="modalclose">✕</button>
    <div id="modalbody"></div>
  </div>
</div>

<script>
const RANKS = {S:"var(--rS)", A:"var(--rA)", B:"var(--rB)", C:"var(--rC)", D:"var(--rD)"};
const ORDER = {S:5, A:4, B:3, C:2, D:1};
const KEY = "yuwasu_game_picks_v2";
const GKEY = "yuwasu_gist_id";
const TAGKEY = "yuwasu_tags_on";
const STEPTITLE = {1:"一覧", 2:"確認中", 3:"採用"};

let GAMES = [];
let state = load();
let step = 1, filters = new Set(), sort = "date", dir = "desc", hideMode = false, query = "";
let onTags = new Set(JSON.parse(localStorage.getItem(TAGKEY) || "[]"));
let onGenres = new Set(JSON.parse(localStorage.getItem("yuwasu_genres_on") || "[]"));

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function saveTags(){ try{ localStorage.setItem(TAGKEY, JSON.stringify([...onTags])); }catch(e){} }
function saveGenres(){ try{ localStorage.setItem("yuwasu_genres_on", JSON.stringify([...onGenres])); }catch(e){} }
function st(id){ if(!state[id]) state[id] = {picked:false, rank:null, hidden:false, adopted:false}; return state[id]; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- Gist ---------- */
const gid = document.getElementById("gid");
const gnote = document.getElementById("gnote");
gid.value = localStorage.getItem(GKEY) || "";
function note(msg, cls){ gnote.textContent = msg; gnote.className = "gnote" + (cls?" "+cls:""); }

document.getElementById("load").onclick = async () => {
  const id = gid.value.trim();
  if(!id){ note("Gist IDを貼り付けてください。", "err"); return; }
  note("読み込んでいます…");
  try{
    const r = await fetch("https://api.github.com/gists/" + encodeURIComponent(id), {
      headers: {"Accept":"application/vnd.github+json"} });
    if(!r.ok) throw new Error("応答 " + r.status + (r.status===404?"（IDが違うか、Gistがありません）":""));
    const meta = await r.json();
    const file = meta.files && meta.files["games.json"];
    if(!file) throw new Error("games.json が見つかりません");
    let text = file.content;
    if(file.truncated){ const r2 = await fetch(file.raw_url); text = await r2.text(); }
    const d = JSON.parse(text);
    GAMES = d.games || [];
    if(!GAMES.length) throw new Error("データが空です");
    localStorage.setItem(GKEY, id);
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("app").classList.add("show");
    buildGenres();
    render();
  }catch(err){ note("読み込めませんでした: " + err.message, "err"); }
};
if(gid.value.trim()) document.getElementById("load").click();

/* ---------- サイドバー開閉（狭い画面） ---------- */
const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("backdrop");
function openSidebar(v){ sidebar.classList.toggle("open", v); backdrop.classList.toggle("show", v); }
document.getElementById("menubtn").onclick = () => openSidebar(!sidebar.classList.contains("open"));
backdrop.onclick = () => openSidebar(false);

/* ---------- ステップ ---------- */
document.querySelectorAll(".step").forEach(b => {
  b.onclick = () => { step = +b.dataset.step; hideMode = false; syncHideUI();
    document.querySelectorAll(".step").forEach(x => x.classList.toggle("on", x===b));
    document.getElementById("headtitle").textContent = STEPTITLE[step];
    document.getElementById("hidesec-ctrl").style.display = (step===1) ? "" : "none";
    openSidebar(false); render(); };
});

/* ---------- 絞り込み（オンオフ・複数可） ---------- */
document.querySelectorAll("#filters .chip").forEach(c => {
  c.onclick = () => {
    const f = c.dataset.f;
    if(filters.has(f)) filters.delete(f); else filters.add(f);
    c.classList.toggle("on", filters.has(f)); render();
  };
});
document.querySelectorAll(".sort").forEach(c => {
  c.onclick = () => { sort = c.dataset.s;
    document.querySelectorAll(".sort").forEach(x => x.classList.toggle("on", x===c)); render(); };
});
const dirbtn = document.getElementById("dirbtn");
dirbtn.onclick = () => { dir = (dir==="desc")?"asc":"desc";
  dirbtn.textContent = dir==="desc" ? "▼ 降順" : "▲ 昇順"; render(); };

const searchEl = document.getElementById("search");
searchEl.oninput = () => { query = searchEl.value.trim().toLowerCase(); render(); };

document.getElementById("rf").onclick = () => {
  filters.clear();
  document.querySelectorAll("#filters .chip").forEach(x => x.classList.remove("on"));
  render();
};
document.getElementById("rt").onclick = () => {
  onTags.clear(); saveTags();
  document.querySelectorAll("#tags .chip").forEach(x => x.classList.remove("on"));
  render();
};
document.getElementById("rg").onclick = () => {
  onGenres.clear(); saveGenres();
  document.querySelectorAll("#genres .chip").forEach(x => x.classList.remove("on"));
  render();
};
document.getElementById("rs").onclick = () => {
  sort = "date"; dir = "desc";
  document.querySelectorAll(".sort").forEach(x => x.classList.toggle("on", x.dataset.s==="date"));
  dirbtn.textContent = "▼ 降順";
  render();
};

const hidebtn = document.getElementById("hidebtn");
hidebtn.onclick = () => { hideMode = !hideMode; syncHideUI(); render(); };
function syncHideUI(){
  hidebtn.classList.toggle("on", hideMode);
  hidebtn.textContent = hideMode ? "非表示を確定" : "非表示モード";
  document.getElementById("hidenote").classList.toggle("show", hideMode);
}

function buildChips(boxId, keyField, activeSet, saver, limit){
  const counts = {};
  GAMES.forEach(g => (g[keyField]||[]).forEach(x => counts[x] = (counts[x]||0)+1));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(x=>x[0]);
  const box = document.getElementById(boxId);
  box.innerHTML = "";
  if(!top.length){ box.innerHTML = '<span style="font-size:11px;color:var(--faint)">データなし</span>'; return; }
  top.forEach(name => {
    const b = document.createElement("button");
    b.className = "chip" + (activeSet.has(name) ? " on" : "");
    b.textContent = name;
    b.onclick = () => {
      if(activeSet.has(name)) activeSet.delete(name); else activeSet.add(name);
      b.classList.toggle("on", activeSet.has(name)); saver(); render();
    };
    box.appendChild(b);
  });
}
function buildGenres(){
  buildChips("tags", "tags", onTags, saveTags, 20);
  buildChips("genres", "genres", onGenres, saveGenres, 12);
  buildTagPop();
}

/* ---------- 絞り込み・並べ替え ---------- */
function passFilter(g){
  if(query && !(g.name||"").toLowerCase().includes(query)) return false;
  if(filters.has("demo") && !g.demo) return false;
  if(filters.has("indie") && !g.self_published) return false;
  if(filters.has("solo") && !g.solo) return false;
  if(filters.has("soon") && !g.coming_soon) return false;
  if(filters.has("video") && !g.trailer) return false;
  if(onTags.size){
    const gt = g.tags||[];
    if(!gt.some(x => onTags.has(x))) return false;
  }
  if(onGenres.size){
    const gg = g.genres||[];
    if(!gg.some(x => onGenres.has(x))) return false;
  }
  return true;
}
function sortList(list){
  const arr = [...list];
  const m = dir==="desc" ? 1 : -1;
  if(sort==="date"){
    arr.sort((a,b)=>{ const da=a.release_date, db=b.release_date;
      if(!da && !db) return 0; if(!da) return 1; if(!db) return -1;
      return da<db ? m : da>db ? -m : 0; });
  }
  else if(sort==="rev") arr.sort((a,b)=>m*((b.recommendations||0)-(a.recommendations||0)));
  else if(sort==="price") arr.sort((a,b)=>m*((b.price||0)-(a.price||0)));
  else if(sort==="rank") arr.sort((a,b)=>m*((ORDER[st(b.appid).rank]||0)-(ORDER[st(a.appid).rank]||0)));
  else if(sort==="tagpop") arr.sort((a,b)=>m*(tagScore(b)-tagScore(a)));
  else if(dir==="asc") arr.reverse();
  return arr;
}

let TAGPOP = {};
function buildTagPop(){
  TAGPOP = {};
  GAMES.forEach(g => (g.tags||[]).forEach(x => TAGPOP[x] = (TAGPOP[x]||0)+1));
}
function tagScore(g){
  // その作品の最上位タグ（先頭）の、全体での出現数。人気タグを持つ作品ほど高い。
  const t = (g.tags||[])[0];
  return t ? (TAGPOP[t]||0) : 0;
}
function updateCounts(){
  const picked = GAMES.filter(g => st(g.appid).picked && !st(g.appid).hidden);
  const adopted = GAMES.filter(g => st(g.appid).adopted);
  document.getElementById("n1").textContent = GAMES.length;
  document.getElementById("n2").textContent = picked.length;
  document.getElementById("n3").textContent = adopted.length;
}

/* ---------- 描画 ---------- */
function render(){
  updateCounts();
  const picked = GAMES.filter(g => st(g.appid).picked && !st(g.appid).hidden);
  const adopted = GAMES.filter(g => st(g.appid).adopted);

  let base;
  if(step===1) base = GAMES.filter(g => !st(g.appid).hidden);
  else if(step===2) base = picked;
  else base = adopted;

  const list = sortList(base.filter(passFilter));
  document.getElementById("count").textContent = list.length + " / " + base.length + "本";

  const box = document.getElementById("tiles");
  if(!list.length){
    box.innerHTML = '<div class="empty">' +
      (step===2 ? '①で気になったタイルをタップして拾ってください。' :
       step===3 ? '②で「採用する」を押すと、ここに並びます。' : '該当なし') + '</div>';
  } else {
    box.innerHTML = list.map(g => tileHTML(g, false)).join("");
  }

  // 非表示セクション（①でモード中のみ）
  const hs = document.getElementById("hidesec");
  const hidden = GAMES.filter(g => st(g.appid).hidden);
  if(step===1 && hideMode && hidden.length){
    hs.style.display = "";
    document.getElementById("hidelb").textContent = "非表示中（タップで戻す）— " + hidden.length + "本";
    document.getElementById("hidetiles").innerHTML = hidden.map(g => tileHTML(g, true)).join("");
  } else {
    hs.style.display = "none";
  }
  bindTiles();
}

function tileHTML(g, isHiddenSec){
  const s = st(g.appid);
  const cls = ["tile"];
  if(step===1 && !hideMode && s.picked) cls.push("picked");
  if(s.rank) cls.push("ranked");
  if(step===1 && hideMode && s.hidden && !isHiddenSec) cls.push("markhide");
  const rk = '<span class="rk"' + (s.rank?' style="background:'+RANKS[s.rank]+'"':'') + '>' + (s.rank||"") + '</span>';
  const showVideo = (step===2 || step===3) && g.trailer;
  const media = '<div class="media" data-id="'+g.appid+'">' +
    '<img src="' + esc(g.header || g.thumb || "") + '" loading="lazy" onerror="this.style.opacity=.15">' +
    (showVideo ? '<div class="play"></div>' : '') + '</div>';
  const fx = [];
  if(g.self_published) fx.push('<span class="indie">個人</span>');
  if(g.demo) fx.push('<span class="demo">体験版</span>');
  if(g.solo) fx.push('<span class="solo">ソロ</span>');
  if(g.trailer) fx.push('<span>▶動画</span>');
  fx.push('<span>Rev' + (g.recommendations||0) + '</span>');
  fx.push('<span>' + esc(g.price_text) + '</span>');
  fx.push('<span>' + (g.coming_soon?"発売前":(g.release_date||"?")) + '</span>');
  let extra = "";
  if(step===2){
    extra = '<div class="ranks">' +
      Object.keys(RANKS).map(r => '<button class="rb' + (s.rank===r?' on':'') + '" data-id="' + g.appid + '" data-r="' + r + '"' +
        (s.rank===r?' style="background:'+RANKS[r]+';border-color:'+RANKS[r]+'"':'') + '>' + r + '</button>').join("") +
      '</div>' +
      '<div class="adoptrow"><button class="ab' + (s.adopted?' on':'') + '" data-id="' + g.appid + '">' +
      (s.adopted?'採用済み':'採用する') + '</button></div>';
  } else if(step===3){
    extra = '<div class="adoptrow"><button class="ab on" data-id="' + g.appid + '">採用を外す</button></div>';
  }
  const steam = '<div class="steamlink"><a href="' + esc(g.url) + '" target="_blank" rel="noopener">Steam ↗</a></div>';
  return '<div class="' + cls.join(' ') + '" data-id="' + g.appid + '">' +
    media + rk + '<div class="check">' + (step===1&&hideMode?'✕':'✓') + '</div>' +
    '<div class="body"><div class="nm">' + esc(g.name) + '</div><div class="fx">' + fx.join("") + '</div></div>' +
    extra + steam + '</div>';
}

function findGame(id){ return GAMES.find(g => g.appid === id); }

function bindTiles(){
  document.querySelectorAll(".steamlink a").forEach(a => a.onclick = e => e.stopPropagation());

  document.querySelectorAll("#tiles > .tile, #hidetiles > .tile").forEach(t => {
    const id = t.dataset.id;
    const media = t.querySelector(".media");
    if(step===1){
      t.onclick = () => {
        const s = st(id);
        if(hideMode){ s.hidden = !s.hidden; }
        else { s.picked = !s.picked; if(!s.picked) s.rank = null; }
        save(); render();
      };
    } else {
      if(media){
        media.onclick = (e) => { e.stopPropagation();
          const g = findGame(id);
          if(g && g.trailer) openModal(g);
        };
      }
      t.querySelectorAll(".rb").forEach(b => {
        b.onclick = (e) => { e.stopPropagation();
          const s = st(b.dataset.id);
          s.rank = (s.rank===b.dataset.r)?null:b.dataset.r; save();
          updateTileRank(t, s); };
      });
      t.querySelectorAll(".ab").forEach(b => {
        b.onclick = (e) => { e.stopPropagation();
          const s = st(b.dataset.id); s.adopted = !s.adopted; save();
          if(step===3){ render(); return; }
          b.classList.toggle("on", s.adopted);
          b.textContent = s.adopted ? "採用済み" : "採用する";
          updateCounts(); };
      });
    }
  });
}

function updateTileRank(tile, s){
  tile.classList.toggle("ranked", !!s.rank);
  const rk = tile.querySelector(".rk");
  if(rk){ rk.textContent = s.rank || ""; rk.style.background = s.rank ? RANKS[s.rank] : ""; }
  tile.querySelectorAll(".rb").forEach(x => {
    const on = s.rank === x.dataset.r;
    x.classList.toggle("on", on);
    x.style.background = on ? RANKS[x.dataset.r] : "";
    x.style.borderColor = on ? RANKS[x.dataset.r] : "";
  });
}

/* ---------- 動画ポップアップ ---------- */
const modal = document.getElementById("modal");
const modalbody = document.getElementById("modalbody");
const modalcap = document.getElementById("modalcap");
let hlsInst = null, hlsLoading = null;

function loadHlsJs(){
  if(window.Hls) return Promise.resolve();
  if(hlsLoading) return hlsLoading;
  hlsLoading = new Promise((ok,ng)=>{ const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js";
    sc.onload=ok; sc.onerror=ng; document.head.appendChild(sc); });
  return hlsLoading;
}
function loadDashJs(){
  if(window.dashjs) return Promise.resolve();
  return new Promise((ok,ng)=>{ const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js";
    sc.onload=ok; sc.onerror=ng; document.head.appendChild(sc); });
}
function fallback(g){
  modalbody.innerHTML = '<div class="fallback" style="padding:40px 20px;text-align:center;color:var(--sub);font-size:13px">' +
    'この動画はブラウザで再生できませんでした。<br><br>' +
    '<a href="' + esc(g.url) + '" target="_blank" rel="noopener" style="color:#8fb8e8">Steamのページで見る ↗</a></div>';
}
function openModal(g){
  modalcap.textContent = g.name;
  modalbody.innerHTML = "";
  const v = document.createElement("video");
  v.controls = true; v.playsInline = true; v.autoplay = true; v.poster = g.thumb || g.header || "";
  v.setAttribute("webkit-playsinline","");
  modalbody.appendChild(v);
  modal.classList.add("show");

  const url = g.trailer, type = g.trailer_type;
  const nativeHls = v.canPlayType("application/vnd.apple.mpegurl");

  if(type === "mp4"){
    v.src = url; v.onerror = () => fallback(g); v.play().catch(()=>{});
  } else if(type === "hls" || /\.m3u8/.test(url)){
    if(nativeHls){ v.src = url; v.onerror = () => fallback(g); v.play().catch(()=>{}); }
    else {
      loadHlsJs().then(()=>{ if(!window.Hls||!Hls.isSupported()){ fallback(g); return; }
        hlsInst = new Hls();
        hlsInst.on(Hls.Events.ERROR,(e,d)=>{ if(d&&d.fatal){ hlsInst.destroy(); hlsInst=null; fallback(g);} });
        hlsInst.loadSource(url); hlsInst.attachMedia(v); v.play().catch(()=>{});
      }).catch(()=>fallback(g));
    }
  } else if(type === "dash"){
    loadDashJs().then(()=>{ if(!window.dashjs){ fallback(g); return; }
      const player = dashjs.MediaPlayer().create();
      player.initialize(v, url, true);
      player.on("error", ()=>fallback(g));
      hlsInst = { destroy: ()=>{ try{player.reset();}catch(e){} } };
    }).catch(()=>fallback(g));
  } else {
    v.src = url; v.onerror = () => fallback(g);
  }
}
function closeModal(){
  modal.classList.remove("show");
  if(hlsInst){ try{hlsInst.destroy();}catch(e){} hlsInst=null; }
  modalbody.innerHTML = "";
}
document.getElementById("modalclose").onclick = closeModal;
modal.onclick = (e) => { if(e.target === modal) closeModal(); };
document.addEventListener("keydown", e => { if(e.key==="Escape" && modal.classList.contains("show")) closeModal(); });

/* ---------- 書き出し・管理 ---------- */
document.getElementById("ics").onclick = () => {
  const adopted = GAMES.filter(g => st(g.appid).adopted);
  const target = adopted.length ? adopted : GAMES.filter(g => st(g.appid).rank);
  if(!target.length){ alert("採用（またはランク付け）したゲームがありません。"); return; }
  const pad = n => String(n).padStart(2,"0");
  const now = new Date();
  const stamp = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"T000000Z";
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//yuwasu//game-picks//JA\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:ゲーム候補\r\n";
  target.forEach(g => {
    if(!g.release_date) return;
    const d = g.release_date.replace(/-/g,"");
    const nx = new Date(g.release_date+"T00:00:00"); nx.setDate(nx.getDate()+1);
    const de = nx.getFullYear()+pad(nx.getMonth()+1)+pad(nx.getDate());
    const r = st(g.appid).rank || "-";
    const desc = ["相性ランク: "+r,"発売日: "+g.release_date,"価格: "+g.price_text,
      "体験版: "+(g.demo?"あり":"なし"),
      "プレイ人数: "+[g.solo?"ソロ可":"",g.coop?"協力":"",g.multi?"マルチ":""].filter(Boolean).join("/"),
      "Steam: "+g.url].join("\\n");
    ics += "BEGIN:VEVENT\r\nUID:steam-"+g.appid+"@yuwasu\r\nDTSTAMP:"+stamp+"\r\n";
    ics += "DTSTART;VALUE=DATE:"+d+"\r\nDTEND;VALUE=DATE:"+de+"\r\n";
    ics += "SUMMARY:【"+r+"】"+g.name.replace(/[,;\\]/g,m=>"\\"+m)+"\r\n";
    ics += "DESCRIPTION:"+desc.replace(/[,;]/g,m=>"\\"+m)+"\r\nEND:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics],{type:"text/calendar;charset=utf-8"}));
  a.download = "game_picks.ics"; document.body.appendChild(a); a.click(); a.remove();
};
document.getElementById("reload").onclick = () => {
  document.getElementById("loader").classList.remove("hidden");
  document.getElementById("app").classList.remove("show");
  note("Gist IDを確認して「更新」を押してください。");
};
document.getElementById("clear").onclick = () => {
  if(!confirm("付けた判定・非表示・採用をすべて消します。よろしいですか。")) return;
  state = {}; save(); render();
};
