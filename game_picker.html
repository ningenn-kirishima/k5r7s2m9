<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム選定ツール</title>
<style>
  :root{
    --bg:#12101a; --panel:#1b1826; --panel2:#211d30; --line:#312b45;
    --ink:#e8e4f0; --sub:#9a93b0; --faint:#6b6482;
    --amber:#ffb347;
    --rS:#ffb347; --rA:#e05cc8; --rB:#8bd45a; --rC:#4a9ae0; --rD:#7a7488;
    --pick:#7b6cf0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,-apple-system,sans-serif;
    line-height:1.55;padding:14px;max-width:900px;margin:0 auto;-webkit-font-smoothing:antialiased}

  header{margin-bottom:14px}
  h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
  .tag{color:var(--sub);font-size:12px;margin-top:3px}

  /* 読み込み */
  .drop{border:2px dashed var(--line);border-radius:14px;padding:26px 16px;text-align:center;
    margin:14px 0;transition:.15s;cursor:pointer}
  .drop:hover,.drop.over{border-color:var(--amber);background:var(--panel)}
  .drop .big{font-size:14px;font-weight:700;margin-bottom:5px}
  .drop .sm{font-size:12px;color:var(--faint)}
  .drop.hidden{display:none}

  /* Gist読み込み */
  .gist{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin:14px 0 10px}
  .glabel{font-size:11px;color:var(--faint);letter-spacing:.1em;font-weight:700;margin-bottom:7px}
  .grow{display:flex;gap:7px}
  .grow input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px 12px;border-radius:10px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .grow input:focus{outline:none;border-color:var(--amber)}
  .grow .act{flex:none;min-width:80px}
  .gnote{font-size:11.5px;color:var(--faint);margin-top:8px}
  .gnote.err{color:#e08a8a}
  .gnote.ok{color:var(--rB)}
  #loader.hidden{display:none}

  /* 段階タブ */
  .steps{display:flex;gap:6px;margin:14px 0 10px}
  .step{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--sub);
    padding:9px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;transition:.15s}
  .step.on{background:var(--panel2);border-color:var(--amber);color:var(--amber)}
  .step .n{display:block;font-size:10px;font-weight:500;color:var(--faint);margin-top:1px}
  .step.on .n{color:var(--sub)}

  /* 絞り込み */
  .bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--sub);
    padding:5px 11px;border-radius:20px;font-size:11.5px;cursor:pointer;transition:.15s}
  .chip.on{border-color:var(--amber);color:var(--amber);background:var(--panel2)}
  .count{margin-left:auto;font-size:11.5px;color:var(--faint)}

  /* 第1段階：タイル */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .tile{background:var(--panel);border:2px solid transparent;border-radius:10px;overflow:hidden;
    cursor:pointer;transition:.12s;position:relative}
  .tile:hover{border-color:var(--line)}
  .tile.picked{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick)}
  .tile img{width:100%;aspect-ratio:460/215;object-fit:cover;display:block;background:var(--panel2)}
  .tile .body{padding:7px 8px 8px}
  .tile .nm{font-size:12px;font-weight:700;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
  .tile .fx{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .fx span{font-size:9.5px;padding:1px 5px;border-radius:4px;background:var(--panel2);color:var(--faint)}
  .fx .solo{color:var(--rB)}
  .fx .demo{color:var(--rB);border:1px solid var(--rB)}
  .fx .indie{color:var(--amber)}
  .fx .rev{color:var(--sub)}
  .tile .check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
    background:rgba(18,16,26,.85);border:1.5px solid var(--line);display:flex;align-items:center;
    justify-content:center;font-size:12px;color:transparent}
  .tile.picked .check{background:var(--pick);border-color:var(--pick);color:#fff}
  .tile .rk{position:absolute;top:6px;left:6px;font-size:10px;font-weight:800;color:#12101a;
    padding:1px 6px;border-radius:5px;display:none}
  .tile.ranked .rk{display:block}

  /* 第2段階：詳細 */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    margin-bottom:12px;overflow:hidden;border-left-width:3px;border-left-color:var(--line)}
  .card video,.card>img{width:100%;display:block;background:#000;aspect-ratio:16/9;object-fit:cover}
  .card .in{padding:12px 13px}
  .card .nm{font-size:16px;font-weight:700;margin-bottom:4px}
  .card .meta{font-size:12px;color:var(--sub);margin-bottom:8px}
  .card .desc{font-size:12.5px;color:var(--sub);margin-bottom:10px;
    padding:8px 10px;background:var(--panel2);border-radius:8px}
  .ranks{display:flex;gap:5px}
  .rb{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--line);background:var(--panel2);
    color:var(--sub);font-size:13px;font-weight:800;cursor:pointer;transition:.12s}
  .rb:hover{border-color:var(--ink)}
  .rb.on{color:#12101a}
  .links{display:flex;gap:8px;margin-top:9px;font-size:12px}
  .links a{color:#8fb8e8;text-decoration:none}
  .links a:hover{text-decoration:underline}

  /* 第3段階：結果 */
  .win{background:linear-gradient(160deg,#3a2c12,var(--panel));border:1px solid var(--amber);
    border-radius:14px;padding:14px;margin-bottom:14px}
  .win .lb{font-size:11px;color:var(--amber);letter-spacing:.1em;font-weight:700}
  .win .nm{font-size:19px;font-weight:800;margin:4px 0 6px}
  .win .meta{font-size:12.5px;color:var(--sub)}
  .row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;margin-bottom:7px}
  .row .rk{font-size:12px;font-weight:800;color:#12101a;padding:2px 8px;border-radius:5px;flex:none}
  .row .nm{font-size:13.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row a{color:#8fb8e8;text-decoration:none;font-size:12px;flex:none}

  .acts{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap}
  .act{flex:1;min-width:130px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .act:hover{border-color:var(--amber);color:var(--amber)}
  .act.pri{background:var(--amber);color:#1a140a;border-color:var(--amber)}
  .act.pri:hover{filter:brightness(1.08);color:#1a140a}
  .hint{font-size:11.5px;color:var(--faint);margin-top:5px}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:32px 0}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span>ゲーム選定ツール</h1>
  <div class="tag">画像で絞る → 動画で決める → 撮る1本が残る</div>
</header>

<div id="loader">
  <div class="gist">
    <div class="glabel">Gist ID</div>
    <div class="grow">
      <input id="gid" type="text" placeholder="スクリプトが表示したIDを貼り付け" autocomplete="off" spellcheck="false">
      <button class="act pri" id="load">更新</button>
    </div>
    <div class="gnote" id="gnote">一度貼れば記憶します。以後は「更新」を押すだけです。</div>
  </div>
  <div class="drop" id="drop">
    <div class="big">または games.json をここに落とす</div>
    <div class="sm">タップしてファイルを選ぶこともできます</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="steps">
    <button class="step on" data-step="1">① 画像で絞る<span class="n" id="n1">0本</span></button>
    <button class="step" data-step="2">② 動画で決める<span class="n" id="n2">0本</span></button>
    <button class="step" data-step="3">③ 結果<span class="n" id="n3">0本</span></button>
  </div>

  <div class="bar" id="bar1">
    <button class="chip on" data-f="all">すべて</button>
    <button class="chip" data-f="demo">体験版あり</button>
    <button class="chip" data-f="indie">個人開発</button>
    <button class="chip" data-f="solo">ソロ可</button>
    <button class="chip" data-f="soon">発売前</button>
    <span class="count" id="cnt1"></span>
  </div>

  <div id="view1"><div class="tiles" id="tiles"></div></div>
  <div id="view2" style="display:none"></div>
  <div id="view3" style="display:none"></div>

  <div class="acts">
    <button class="act pri" id="ics">⤓ 選んだ分を .ics で書き出す</button>
    <button class="act" id="reload">最新を読み直す</button>
    <button class="act" id="clear">判定をリセット</button>
  </div>
  <div class="hint">判定はこのブラウザに保存されます。.ics はiPhoneのカレンダーに取り込めます。</div>
</div>

<script>
const RANKS = {S:"var(--rS)", A:"var(--rA)", B:"var(--rB)", C:"var(--rC)", D:"var(--rD)"};
const ORDER = {S:5, A:4, B:3, C:2, D:1};
const KEY = "yuwasu_game_picks_v1";

let GAMES = [];
let state = load();   // {appid: {picked:bool, rank:"S"|null}}
let step = 1;
let filter = "all";

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function st(id){ if(!state[id]) state[id] = {picked:false, rank:null}; return state[id]; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---------- 読み込み ---------- */
const drop = document.getElementById("drop");
drop.onclick = () => {
  const i = document.createElement("input");
  i.type = "file"; i.accept = ".json,application/json";
  i.onchange = e => e.target.files[0] && read(e.target.files[0]);
  i.click();
};
["dragenter","dragover"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => {
  const f = e.dataTransfer.files[0];
  if(f) read(f);
});
function read(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      GAMES = d.games || [];
      if(!GAMES.length) throw new Error("空です");
      document.getElementById("loader").classList.add("hidden");
      document.getElementById("app").style.display = "block";
      render();
    }catch(err){
      alert("読み込めませんでした: " + err.message);
    }
  };
  r.readAsText(file);
}

/* ---------- Gistから読む ---------- */
const GKEY = "yuwasu_gist_id";
const gid = document.getElementById("gid");
const gnote = document.getElementById("gnote");
gid.value = localStorage.getItem(GKEY) || "";

function note(msg, cls){
  gnote.textContent = msg;
  gnote.className = "gnote" + (cls ? " " + cls : "");
}

document.getElementById("load").onclick = async () => {
  const id = gid.value.trim();
  if(!id){ note("Gist IDを貼り付けてください。", "err"); return; }
  note("読み込んでいます…");
  try{
    const r = await fetch("https://api.github.com/gists/" + encodeURIComponent(id), {
      headers: {"Accept":"application/vnd.github+json"}
    });
    if(!r.ok) throw new Error("応答 " + r.status + (r.status===404 ? "（IDが違うか、Gistがありません）" : ""));
    const meta = await r.json();
    const file = meta.files && meta.files["games.json"];
    if(!file) throw new Error("games.json が見つかりません");

    let text = file.content;
    if(file.truncated){                      // 1MB超のときは実体を取りに行く
      const r2 = await fetch(file.raw_url);
      if(!r2.ok) throw new Error("本体の取得に失敗しました");
      text = await r2.text();
    }
    const d = JSON.parse(text);
    GAMES = d.games || [];
    if(!GAMES.length) throw new Error("データが空です");

    localStorage.setItem(GKEY, id);
    note(d.count + "本を読み込みました（" + (d.generated_at||"") + "）", "ok");
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("app").style.display = "block";
    render();
  }catch(err){
    note("読み込めませんでした: " + err.message, "err");
  }
};

/* 保存済みのIDがあれば自動で読む */
if(gid.value.trim()) document.getElementById("load").click();

/* ---------- 段階の切り替え ---------- */
document.querySelectorAll(".step").forEach(b => {
  b.onclick = () => {
    step = +b.dataset.step;
    document.querySelectorAll(".step").forEach(x => x.classList.toggle("on", x === b));
    render();
  };
});
document.querySelectorAll("#bar1 .chip").forEach(c => {
  c.onclick = () => {
    filter = c.dataset.f;
    document.querySelectorAll("#bar1 .chip").forEach(x => x.classList.toggle("on", x === c));
    render();
  };
});

/* ---------- 描画 ---------- */
function passFilter(g){
  if(filter === "demo") return g.demo;
  if(filter === "indie") return g.self_published;
  if(filter === "solo") return g.solo;
  if(filter === "soon") return g.coming_soon;
  return true;
}

function render(){
  const picked = GAMES.filter(g => st(g.appid).picked);
  const ranked = picked.filter(g => st(g.appid).rank);
  document.getElementById("n1").textContent = GAMES.length + "本";
  document.getElementById("n2").textContent = picked.length + "本";
  document.getElementById("n3").textContent = ranked.length + "本";

  document.getElementById("view1").style.display = step === 1 ? "block" : "none";
  document.getElementById("view2").style.display = step === 2 ? "block" : "none";
  document.getElementById("view3").style.display = step === 3 ? "block" : "none";
  document.getElementById("bar1").style.display = step === 1 ? "flex" : "none";

  if(step === 1) renderTiles();
  if(step === 2) renderCards(picked);
  if(step === 3) renderResult(ranked);
}

function renderTiles(){
  const list = GAMES.filter(passFilter);
  document.getElementById("cnt1").textContent = list.length + " / " + GAMES.length + "本";
  const box = document.getElementById("tiles");
  if(!list.length){ box.innerHTML = '<div class="empty">該当なし</div>'; return; }
  box.innerHTML = list.map(g => {
    const s = st(g.appid);
    const cls = ["tile"];
    if(s.picked) cls.push("picked");
    if(s.rank) cls.push("ranked");
    const rk = s.rank ? '<span class="rk" style="background:'+RANKS[s.rank]+'">'+s.rank+'</span>' : '<span class="rk"></span>';
    const fx = [];
    if(g.self_published) fx.push('<span class="indie">個人</span>');
    if(g.demo) fx.push('<span class="demo">体験版</span>');
    if(g.solo) fx.push('<span class="solo">ソロ</span>');
    fx.push('<span class="rev">レビュー'+(g.recommendations||0)+'</span>');
    fx.push('<span>'+esc(g.price_text)+'</span>');
    const date = g.coming_soon ? "発売前" : (g.release_date || "日付不明");
    fx.push('<span>'+date+'</span>');
    const img = g.header || g.capsule;
    return '<div class="'+cls.join(' ')+'" data-id="'+g.appid+'">'+
      '<img src="'+esc(img)+'" loading="lazy" onerror="this.style.opacity=.2">'+
      rk + '<div class="check">✓</div>'+
      '<div class="body"><div class="nm">'+esc(g.name)+'</div>'+
      '<div class="fx">'+fx.join("")+'</div></div></div>';
  }).join("");
  box.querySelectorAll(".tile").forEach(t => {
    t.onclick = () => {
      const s = st(t.dataset.id);
      s.picked = !s.picked;
      if(!s.picked) s.rank = null;
      save(); render();
    };
  });
}

function renderCards(picked){
  const box = document.getElementById("view2");
  if(!picked.length){
    box.innerHTML = '<div class="empty">まず①でタイルをタップして候補を選んでください。</div>';
    return;
  }
  box.innerHTML = picked.map(g => {
    const s = st(g.appid);
    const media = g.trailer
      ? '<video src="'+esc(g.trailer)+'" controls preload="none" poster="'+esc(g.header)+'"></video>'
      : '<img src="'+esc(g.header)+'" onerror="this.style.opacity=.2">';
    const meta = [
      g.coming_soon ? "発売前" : (g.release_date || "日付不明"),
      g.price_text,
      "レビュー" + (g.recommendations || 0),
      (g.developers || []).join(", "),
    ].filter(Boolean).join(" ・ ");
    const btns = Object.keys(RANKS).map(r =>
      '<button class="rb'+(s.rank===r?' on':'')+'" data-id="'+g.appid+'" data-r="'+r+'"'+
      (s.rank===r?' style="background:'+RANKS[r]+';border-color:'+RANKS[r]+'"':'')+'>'+r+'</button>'
    ).join("");
    return '<div class="card" style="border-left-color:'+(s.rank?RANKS[s.rank]:"var(--line)")+'">'+
      media +
      '<div class="in"><div class="nm">'+esc(g.name)+'</div>'+
      '<div class="meta">'+esc(meta)+'</div>'+
      (g.short_desc ? '<div class="desc">'+esc(g.short_desc)+'</div>' : '')+
      '<div class="ranks">'+btns+'</div>'+
      '<div class="links"><a href="'+esc(g.url)+'" target="_blank" rel="noopener">Steamで見る ↗</a>'+
      (g.demo ? '<span style="color:var(--rB)">体験版あり</span>' : '')+'</div>'+
      '</div></div>';
  }).join("");
  box.querySelectorAll(".rb").forEach(b => {
    b.onclick = () => {
      const s = st(b.dataset.id);
      s.rank = (s.rank === b.dataset.r) ? null : b.dataset.r;
      save(); render();
    };
  });
}

function renderResult(ranked){
  const box = document.getElementById("view3");
  if(!ranked.length){
    box.innerHTML = '<div class="empty">②で動画を見てランクを付けると、ここに結果が出ます。</div>';
    return;
  }
  const sorted = [...ranked].sort((a,b) => ORDER[st(b.appid).rank] - ORDER[st(a.appid).rank]);
  const top = sorted[0];
  const meta = [
    top.coming_soon ? "発売前" : (top.release_date || "日付不明"),
    top.price_text,
    top.demo ? "体験版あり" : "",
  ].filter(Boolean).join(" ・ ");
  let html = '<div class="win"><div class="lb">今週の1本</div>'+
    '<div class="nm">'+esc(top.name)+'</div>'+
    '<div class="meta">'+esc(meta)+' ・ ランク '+st(top.appid).rank+'</div></div>';
  html += sorted.map(g => {
    const r = st(g.appid).rank;
    return '<div class="row"><span class="rk" style="background:'+RANKS[r]+'">'+r+'</span>'+
      '<span class="nm">'+esc(g.name)+'</span>'+
      '<a href="'+esc(g.url)+'" target="_blank" rel="noopener">Steam ↗</a></div>';
  }).join("");
  box.innerHTML = html;
}

/* ---------- 書き出し ---------- */
document.getElementById("ics").onclick = () => {
  const ranked = GAMES.filter(g => st(g.appid).rank);
  if(!ranked.length){ alert("ランクを付けたゲームがありません。"); return; }
  const pad = n => String(n).padStart(2, "0");
  const now = new Date();
  const stamp = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"T000000Z";
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//yuwasu//game-picks//JA\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:ゲーム候補\r\n";
  ranked.forEach(g => {
    if(!g.release_date) return;   // 日付未定はカレンダーに置けない
    const d = g.release_date.replace(/-/g, "");
    const nx = new Date(g.release_date + "T00:00:00");
    nx.setDate(nx.getDate() + 1);
    const de = nx.getFullYear()+pad(nx.getMonth()+1)+pad(nx.getDate());
    const r = st(g.appid).rank;
    const desc = [
      "相性ランク: " + r,
      "発売日: " + g.release_date,
      "価格: " + g.price_text,
      "体験版: " + (g.demo ? "あり" : "なし"),
      "プレイ人数: " + [g.solo?"ソロ可":"", g.coop?"協力":"", g.multi?"マルチ":""].filter(Boolean).join("/"),
      "開発: " + (g.developers||[]).join(", "),
      "レビュー数: " + (g.recommendations||0),
      "Steam: " + g.url,
    ].join("\\n");
    ics += "BEGIN:VEVENT\r\n";
    ics += "UID:steam-"+g.appid+"@yuwasu\r\n";
    ics += "DTSTAMP:"+stamp+"\r\n";
    ics += "DTSTART;VALUE=DATE:"+d+"\r\n";
    ics += "DTEND;VALUE=DATE:"+de+"\r\n";
    ics += "SUMMARY:【"+r+"】"+g.name.replace(/[,;\\]/g, m => "\\"+m)+"\r\n";
    ics += "DESCRIPTION:"+desc.replace(/[,;]/g, m => "\\"+m)+"\r\n";
    ics += "END:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], {type:"text/calendar;charset=utf-8"}));
  a.download = "game_picks.ics";
  document.body.appendChild(a); a.click(); a.remove();
};

document.getElementById("reload").onclick = () => {
  document.getElementById("loader").classList.remove("hidden");
  document.getElementById("app").style.display = "none";
  note("Gist IDを確認して「更新」を押してください。");
};

document.getElementById("clear").onclick = () => {
  if(!confirm("付けた判定をすべて消します。よろしいですか。")) return;
  state = {}; save(); render();
};
</script>
</body>
</html>
